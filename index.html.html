
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mayan Pyramid 3D</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial;}
#title{
position:absolute;top:15px;left:15px;color:white;
background:rgba(0,0,0,0.5);padding:10px;border-radius:8px}
</style>
</head>
<body>

<div id="title">
Mayan Pyramid 3D<br>
Drag to rotate • Scroll to zoom
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import {OrbitControls} from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';
import {FBXLoader} from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/FBXLoader.js';

const scene=new THREE.Scene();

const loader=new THREE.TextureLoader();
loader.load(
'https://images.unsplash.com/photo-1508780709619-79562169bc64',
(texture)=>{
texture.mapping=THREE.EquirectangularReflectionMapping;
scene.background=texture;
scene.environment=texture;
}
);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(6,6,10);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const sun=new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
sun.castShadow=true;
scene.add(sun);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

const groundGeo=new THREE.PlaneGeometry(200,200);
const groundMat=new THREE.MeshStandardMaterial({color:0x2d4f2d});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

const fbxLoader=new FBXLoader();

fbxLoader.load("Mayan_Pyramide.fbx",(model)=>{
model.scale.set(0.02,0.02,0.02);

model.traverse((child)=>{
if(child.isMesh){
child.castShadow=true;
child.material.color.set(0xbfa06a);
child.material.roughness=0.9;
}
});

scene.add(model);
});

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
