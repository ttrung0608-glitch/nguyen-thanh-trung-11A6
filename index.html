<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mayan Pyramid 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
}

#title{
position:absolute;
top:15px;
left:15px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

model-viewer{
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<div id="title">
Mayan Pyramid 3D<br>
Drag to rotate • Scroll to zoom
</div>

<model-viewer
src="Mayan_Pyramide.glb"
auto-rotate
camera-controls
shadow-intensity="1"
environment-image="neutral"
exposure="1"
ar
ar-modes="webxr scene-viewer quick-look">
</model-viewer>

</body>
</html>
